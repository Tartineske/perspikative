  <!-- Style Spécifique pour la page Recherche -->
  <style>
    /* Centrage du bloc de recherche */
    .search-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 60vh; /* Garde de l'espace */
      padding-top: 20px;
    }

    /* Conteneur de la barre */
    .search-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Style de la bulle/barre de recherche */
    .search-bubble {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 40px;
      padding: 10px 20px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .search-bubble:focus-within {
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 10px 40px rgba(44, 168, 119, 0.2);
    }

    .search-logo {
      width: 24px;
      height: 24px;
      opacity: 0.8;
      margin-right: 10px;
    }

    .search-input {
      border: none;
      background: transparent;
      outline: none;
      font-size: 1.1rem;
      color: #fff;
      width: 100%;
      font-family: 'Rubik', sans-serif;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
      font-weight: 400;
    }

    /* Grille des résultats */
    #searchResults {
      width: 100%;
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      padding-bottom: 40px;
    }

    /* Une carte de résultat */
    .result-item {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      padding: 12px;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
      animation: fadeInUp 0.4s ease;
    }

    .result-item:hover {
      transform: translateX(5px);
      background: rgba(255, 255, 255, 0.22);
    }

    /* Miniature image résultat */
    .result-thumb {
      width: 55px;
      height: 55px;
      border-radius: 12px;
      object-fit: cover;
      margin-right: 15px;
      background: rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Texte résultat */
    .result-info h3 {
      margin: 0;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .result-info p {
      margin: 4px 0 0 0;
      color: #ddd;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    /* Badge Catégorie */
    .badge-cat {
      display: inline-block;
      font-size: 0.7rem;
      background: rgba(44, 168, 119, 0.6);
      color: white;
      padding: 2px 8px;
      border-radius: 8px;
      margin-left: 8px;
      vertical-align: middle;
      font-weight: normal;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

  <!-- ================= SCRIPT MOTEUR DE RECHERCHE ================= -->
  <script>
    // --- 1. Menu Mobile ---
    const menuToggle = document.getElementById('menuToggle');
    menuToggle.addEventListener('change', (e) => {
      document.body.classList.toggle('menu-open', e.target.checked);
    });

    // --- 2. BASE DE DONNÉES DU SITE (À remplir !) ---
    // Ajoute ici tes nouvelles pages ou créations manuellement
    const siteContent = [
      // Pages principales
      { title: "Portfolio - Créations", category: "Galerie", url: "portfolio/creations.html", tags: "dessin peinture art couleur", img: "logos/portfolio.svg" },
      { title: "Portfolio - Illustrations", category: "Galerie", url: "portfolio/illustrations.html", tags: "histoires digital personnages", img: "logos/portfolio.svg" },
      { title: "Portfolio - Projets", category: "Projet", url: "portfolio/projets.html", tags: "bâtiments maquettes concept", img: "logos/portfolio.svg" },
      { title: "À propos de moi", category: "Info", url: "a-propos.html", tags: "qui suis je bio autrice artiste", img: "logos/a-propos.svg" },
      { title: "Art Challenge", category: "Challenge", url: "art-challenge.html", tags: "défi concours thème dessin", img: "logos/fermer.svg" },
      { title: "Contact", category: "Contact", url: "contact.html", tags: "message email parler", img: "logos/contact.svg" },

      // Exemple d'oeuvres (Remplace avec tes vraies données si tu veux que ça pointe vers des ancres spécifiques)
      { title: "The Lil Stork", category: "Oeuvre", url: "portfolio/illustrations.html", tags: "cigogne oiseau mignon encre", img: "" },
      { title: "La Souris Lectrice", category: "Oeuvre", url: "portfolio/illustrations.html", tags: "souris livre bibliothèque", img: "" },
      { title: "Tower Art", category: "Projet", url: "portfolio/projets.html", tags: "tour architecture dessin", img: "" }
    ];

    // --- 3. LOGIQUE DE RECHERCHE ---
    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('searchResults');

    searchInput.addEventListener('input', function(e) {
      const query = e.target.value.toLowerCase().trim();
      resultsContainer.innerHTML = ''; // Nettoyer

      if (query.length < 2) return; // Ne cherche pas si moins de 2 lettres

      // Filtrer
      const results = siteContent.filter(item => {
        return item.title.toLowerCase().includes(query) || 
               item.tags.toLowerCase().includes(query) || 
               item.category.toLowerCase().includes(query);
      });

      // Afficher
      if (results.length === 0) {
        resultsContainer.innerHTML = `<div style="color:white; text-align:center; opacity:0.7;">Aucun résultat pour "${e.target.value}"</div>`;
      } else {
        results.forEach(item => {
          // Si pas d'image définie, utiliser une icône par défaut
          const imageSrc = item.img ? item.img : 'logos/rechercher.svg';
          
          const html = `
            <a href="${item.url}" class="result-item">
              <img src="${imageSrc}" alt="miniature" class="result-thumb">
              <div class="result-info">
                <h3>${item.title} <span class="badge-cat">${item.category}</span></h3>
                <p>Mots-clés : ${item.tags.substring(0, 40)}...</p>
              </div>
            </a>
          `;
          resultsContainer.innerHTML += html;
        });
      }
    });
  </script>
