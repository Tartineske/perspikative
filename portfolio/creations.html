      <div class="masonry active">
        <img
          class="prspk-thumb"
          src="creations/40.webp"
          alt="Créations 40"
          fetchpriority="high"
          data-title="THE COZY HOUSE OF THE FIELD MOUSE"
          data-desc="🎨 <strong>Teintes :</strong> Noir et blanc<br>
                     ⌛️ <strong>Temps de travail :</strong> 4h<br>
                     ❇️ <strong>Particularités :</strong> Première création entièrement réalisée au stylo<br>
                     💭 <strong>Imagination :</strong> 90% improvisée • 10% d'Internet<br>
                     💬 <strong>Commentaires :</strong><br>
                     Je l'ai entendu. Il était au dessus de moi. Je le sais ; il se levait pour prendre un livre et raviver le feu. Il semblait qu'il ait tout fait lui-même : les murs,
                     l'imposante cheminée, les meubles, son parquet. Tout. Et ce fada de lecture et collectionneur d'assiettes en porcelaine nous en cache certainement bien d'autres là
                     haut, dans le plafond... 📰"
        />

        <img
          class="prspk-thumb"
          src="creations/39.webp"
          alt="Créations 39"
          fetchpriority="high"
          data-title="A WANDERER IN GINGER WOOD"
          data-desc="🎨 <strong>Teintes :</strong> Orange, vert, rouge, bleu, rose, jaune et mauve<br>
                     ⌛️ <strong>Temps de travail :</strong> 2h30<br>
                     ❇️ <strong>Particularités :</strong> Nouveau style graphique expérimenté<br>
                     💭 <strong>Imagination :</strong> 60% réfléchie • 40% improvisée<br>
                     💬 <strong>Commentaires :</strong><br>
                     Because there are things that we can't say. Parce que parfois, juste marcher ça fait du bien. Parce que l'automne nous accueille, parce que cette fille, qui marche,
                     elle avait juste besoin de ça. Juste de s'échapper quelques instants. Elle reviendra. Ginger Wood fera écho à nouveau 🍁"
        />
 
        <img
          class="prspk-thumb"
          src="creations/38.webp"
          alt="Création 38"
          fetchpriority="high"
          data-title="THE OLD, OLD LIGHTHOUSE"
          data-desc="🎨 <strong>Teintes :</strong> Bleu, mauve, jaune, rouge, violet, rose et orange<br>
                     ⌛️ <strong>Temps de travail :</strong> 3h30<br>
                     ❇️ <strong>Particularités :</strong> Police d'écriture dominante, effets de perspective<br>
                     💭 <strong>Imagination :</strong> 80% réfléchie • 20% improvisée<br>
                     💬 <strong>Commentaires :</strong><br>
                     La légende raconte qu'un phare s'est décroché de la falaise, et qu'il a rejoint le ciel… Une nuit cependant, en plein milieu de l'Atlantique lors d'un violent orage,
                     une lumière divine traversa le ciel noir. Des marins l'ont vus. Cette lumière. Cette lumière familière, qui tournait, qui tournait. Au dessus de l'orage, bien au-
                     dessus, un phare mystérieux disparu, qu'on croyait légende, pourtant flottait dans la nuit étoilée 🌌"
        />

        <img
          class="prspk-thumb"
          src="creations/37.webp"
          alt="Création 37"
          fetchpriority="high"
          data-title="THE IA HOME"
          data-desc="🎨 <strong>Teintes :</strong> Beige, gris, bleu, rouge, jaune, vert, rose, mauve et violet<br>
                     ⌛️ <strong>Temps de travail :</strong> 4h30<br>
                     ❇️ <strong>Particularités :</strong> Perspective isométrique, contraste marqué et nouvelles techniques expérimentées<br>
                     💭 <strong>Imagination :</strong> 50% réfléchie • 40% improvisée • 10% d'Internet<br>
                     💬 <strong>Commentaires :</strong><br>
                     On l'utilise souvent ou rarement, en lui demandant tout et n'importe quoi. Et elle nous répond. Elle a les réponses à tout. C'est ainsi que je vois l'intelligence
                     artificielle. Sa maison. The IA home. Ce n'est pas qu'une maison d'ailleurs. C'est une usine révolutionnaire, qui malgré elle exploite nos données… quitte à tout à
                     faire 🚨"
        />

        <img
          class="prspk-thumb"
          src="creations/36.webp"
          alt="Création 36"
          data-title="CREATIVE THOUGHTS"
          data-desc="🎨 <strong>Teintes :</strong> Rouge, bleu, jaune, orange, vert, mauve, rose et brun<br>
                     ⌛️ <strong>Temps de travail :</strong> 0h15<br>
                     ❇️ <strong>Particularités :</strong> Collage, change d'un dessin classique habituellement posté<br>
                     💭 <strong>Imagination :</strong> 60% réfléchie • 30% improvisée • 10% d'Internet<br>
                     💬 <strong>Commentaires :</strong><br>
                     En voilà, de l'originalité et du renouveau! Cette création change d'un dessin habituel. En fait, c'est juste un collage de nombreux croquis et de d'autres souvenirs
                     matériels que j'ai collé ici. Rien d'extraordinaire. Pourtant; c'est tellement sympa qu'il se pourrait que j'en refasse... ✂️"
        />

        <img
          class="prspk-thumb"
          src="creations/35.webp"
          alt="Création 35"
          data-title="THE BLUE BAKERY"
          data-desc="🎨 <strong>Teintes :</strong> Rouge, bleu, vert, brun, orange, mauve et rose<br>
                     ⌛️ <strong>Temps de travail :</strong> 2h30<br>
                     ❇️ <strong>Particularités :</strong> Perspective isométrique, style d'infographie testé<br>
                     💭 <strong>Imagination :</strong> 70% réfléchie • 25% improvisée • 5% d'Internet<br>
                     💬 <strong>Commentaires :</strong><br>
                     J’étais à l’intérieur dans ce rêve. C'était la nuit, j'étais au premier étage, et les propriétaires de la boulangerie dormaient. The Blue Bakery m’a accueilli une
                     nuit, et je l’ai dessinée pour m’en souvenir 🥖"
        />

        <img
          class="prspk-thumb"
          src="creations/34.webp"
          alt="Création 34"
          data-title="MEETING IN THE VALLEY"
          data-desc="🎨 <strong>Teintes :</strong> Jaune, rouge, orange, bleu, vert, violet, rose et brun<br>
                     ⌛️ <strong>Temps de travail :</strong> 1h30<br>
                     ❇️ <strong>Particularités :</strong> Police d'écriture dominante, effets de perspective<br>
                     💭 <strong>Imagination :</strong> 55% réfléchie • 45% improvisée<br>
                     💬 <strong>Commentaires :</strong><br>
                     Imaginé et dessiné en deux soirs, cette création pourtant complexe nous embarque dans un rêve matériel. Inspiré d'une vieille histoire que j'ai écrite, ce paysage
                     m'est immédiatement apparu quand j'ai relu un passage. Entrez donc, dans cet imaginaire débordant et envoûtant. Cette ville, dans une vaste plaine blanche, est un
                     grain coloré dans ce monde encore immaculé. Mais il semble que deux personnes vont apprendre à se connaître, et ce meeting in the valley renversera leurs vies… 🪬"
        />

        <img
          class="prspk-thumb"
          src="creations/33.webp"
          alt="Création 33"
          data-title="THE MOON MEADOWS STABLE"
          data-desc="🎨 <strong>Teintes :</strong> Jaune, orange, vert, bleu, gris, brun, rouge et gris<br>
                     ⌛️ <strong>Temps de travail :</strong> 5h30<br>
                     ❇️ <strong>Particularités :</strong> Deux pages de mon sketchbook, perspective isométrique et semi réaliste<br>
                     💭 <strong>Imagination :</strong> 55% réfléchie • 30% improvisée • 15% d'Internet<br>
                     💬 <strong>Commentaires :</strong><br>
                     Cette fois, cap sur les grands espaces (et les plateaux de tournage!)<br>
                     Silence, moteur… action! Une caméra, une scène, et un cheval prêt à galoper sous les projecteurs : le cinéma et l’équitation se rencontrent dans une création exclusive
                     de collab… Entendez-vous le claquement du clipboarding et le bruit des sabots? 🎬🐎"
        />

        <img
          class="prspk-thumb"
          src="creations/32.webp"
          alt="Création 32"
          data-title="POP-BOX FLOWERS"
          data-desc="🎨 <strong>Teintes :</strong> Vert, orange, rouge, bleu, jaune, brun, mauve, rose et violet<br>
                     ⌛️ <strong>Temps de travail :</strong> 2h30<br>
                     ❇️ <strong>Particularités :</strong> Première page de mon sketchbook, perspective improvisée mais réaliste<br>
                     💭 <strong>Imagination :</strong> 60% réfléchie • 35% improvisée • 5% d'Internet<br>
                     💬 <strong>Commentaires :</strong><br>
                     Welcome to my sketchbook №2! Oui, POP-BOX flowers est sur une demi page. Mais quel honneur immense de lancer le premier dessin d'un nouveau carnet! Sentez les bonnes
                     odeurs de ce bouquet, délicatement posé dans une boîte de pop-corn, et laissez vous porter… 🍿"
        />

        <img
          class="prspk-thumb"
          src="creations/31.webp"
          alt="Création 31"
          data-title="ONCE UPON A DREAM"
          data-desc="🎨 <strong>Teintes :</strong> Bleu, rouge, beige, jaune, marron, vert, mauve, rose, orange et violet<br>
                     ⌛️ <strong>Temps de travail :</strong> 4h"
        />

        <img
          class="prspk-thumb"
          src="creations/30.webp"
          alt="Création 30"
          data-title="BIRKSKOV"
          data-desc="🎨 <strong>Teintes :</strong> Jaune, mauve, blanc et bleu<br>
                     ⌛️ <strong>Temps de travail :</strong> 2h30<br>
                     ❇️ <strong>Particularités :</strong> Atmosphère apaisante, nouvel essai graphique<br>
                     💭 <strong>Imagination :</strong> 80% réfléchie • 20% improvisée<br>
                     💬 <strong>Commentaires :</strong><br>
                     Birkskov. Signifie «forêt de bouleaux» en danois (sans compter la prononciation danoise, cette création se prononce «Beurk-skov»). Une forêt enchantée où se cache une
                     petite chaumière, un refuge serein au milieu d'une scène hivernale. Cette création représente la beauté est le mystère de l'hiver, et sa simplicité 🌿✨"
        />

  <!-- LIGHTBOX STRUCTURE -->
  <div class="lightbox-overlay" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <div class="lightbox-window">
      <div class="lightbox-left">
        <img id="lightbox-img" src="" alt="">
      </div>
      <div class="lightbox-right">
        <h3 id="lightbox-title"></h3>
        <p id="lightbox-desc"></p>
        <div class="lightbox-extra-images" id="lightbox-extra"></div>
      </div>
    </div>
  </div>

  <script>
    // ----- LIGHTBOX -----
const thumbs = document.querySelectorAll('.prspk-thumb');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxTitle = document.getElementById('lightbox-title');
const lightboxDesc = document.getElementById('lightbox-desc');
const lightboxExtra = document.getElementById('lightbox-extra');
const closeBtn = document.getElementById('lightbox-close');

thumbs.forEach(img => {
  img.addEventListener('click', () => {
    // Image principale
    lightboxImg.src = img.src;

    // Titre
    lightboxTitle.textContent = img.dataset.title || '';

    // Description avec HTML interprété (<br>, <strong>, etc.)
    lightboxDesc.innerHTML = img.dataset.desc || '';

    // Afficher la lightbox et bloquer le scroll
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  });
});

// Fermer avec le bouton
closeBtn.addEventListener('click', () => {
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
});

// Fermer en cliquant sur le fond
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }
});
  </script>
