          data-desc="🎨 <strong>Teintes :</strong> Noir et blanc<br>
                     ⌛️ <strong>Temps de travail :</strong> 4h<br>
                     ❇️ <strong>Particularités :</strong> Première création entièrement réalisée au stylo<br>
                     💭 <strong>Imagination :</strong> 90% improvisée • 10% d'Internet<br>
                     💬 <strong>Commentaires :</strong><br>
                     Je l'ai entendu. Il était au dessus de moi. Je le sais ; il se levait pour prendre un livre et raviver le feu. Il semblait qu'il ait tout fait lui-même : les murs,
                     l'imposante cheminée, les meubles, son parquet. Tout. Et ce fada de lecture et collectionneur d'assiettes en porcelaine nous en cache certainement bien d'autres là
                     haut, dans le plafond… 📰"
        />

        <img
          class="prspk-thumb"
          src="creations/37.webp"
          alt="Création 37"
          data-title="THE IA HOME"
          data-desc="🎨 <strong>Teintes :</strong> Beige, gris, bleu, rouge, jaune, vert, rose, mauve et violet<br>
                     ⌛️ <strong>Temps de travail :</strong> 4h30<br>
                     ❇️ <strong>Particularités :</strong> Perspective isométrique, contraste marqué et nouvelles techniques expérimentées<br>
                     💭 <strong>Imagination :</strong> 50% réfléchie • 40% improvisée • 10% d'Internet<br>
                     💬 <strong>Commentaires :</strong><br>
                     On l'utilise souvent ou rarement, en lui demandant tout et n'importe quoi. Et elle nous répond. Elle a les réponses à tout. C'est ainsi que je vois l'intelligence
                     artificielle. Sa maison. The IA home. Ce n'est pas qu'une maison d'ailleurs. C'est une usine révolutionnaire, qui malgré elle exploite nos données… quitte à tout à
                     faire 🚨"
        />

  <!-- LIGHTBOX STRUCTURE -->
  <div class="lightbox-overlay" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">
      <img src="../logos/fermer.svg" alt="Fermer">
    </button>
    <div class="lightbox-window">
      <div class="lightbox-left">
        <img id="lightbox-img" src="" alt="">
      </div>
      <div class="lightbox-right">
        <h3 id="lightbox-title"></h3>
        <p id="lightbox-desc"></p>
        <div class="lightbox-extra-images" id="lightbox-extra"></div>
      </div>
    </div>
  </div>

  <script>

    // ----- LIGHTBOX -----
const thumbs = document.querySelectorAll('.prspk-thumb');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxTitle = document.getElementById('lightbox-title');
const lightboxDesc = document.getElementById('lightbox-desc');
const lightboxExtra = document.getElementById('lightbox-extra');
const closeBtn = document.getElementById('lightbox-close');

thumbs.forEach(img => {
  img.addEventListener('click', () => {
    // Image principale
    lightboxImg.src = img.src;

    // Titre
    lightboxTitle.textContent = img.dataset.title || '';

    // Description avec HTML interprété (<br>, <strong>, etc.)
    lightboxDesc.innerHTML = img.dataset.desc || '';

    // Afficher la lightbox et bloquer le scroll
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  });
});

// Fermer avec le bouton
closeBtn.addEventListener('click', () => {
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
});

// Fermer en cliquant sur le fond
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }
});
  </script>


  <script>
    const menuToggle = document.getElementById('menuToggle');
    menuToggle.addEventListener('change', (e) => {
      document.body.classList.toggle('menu-open', e.target.checked);
    });
  </script>

  <script src="../script.js"></script>
</body>
